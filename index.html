<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.active {
        display: flex;
      }
    </style>
  </head>
  <body class="min-h-screen flex flex-col items-center justify-start p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">

    <!-- ───── TOP NAV BAR ───── -->
    <div class="w-full max-w-7xl flex justify-between items-center mb-8">
      <h2 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">
        🎬 ChaiCode Cinema
      </h2>

      <!-- Logged OUT state -->
      <div id="authButtons" class="flex gap-3">
        <button onclick="openModal('login')"
          class="px-5 py-2 rounded-xl bg-slate-700 hover:bg-slate-600 text-white font-semibold transition">
          Login
        </button>
        <button onclick="openModal('register')"
          class="px-5 py-2 rounded-xl bg-emerald-500 hover:bg-emerald-400 text-white font-semibold transition">
          Register
        </button>
      </div>

      <!-- Logged IN state (hidden by default) -->
      <div id="userInfo" class="hidden flex gap-4 items-center">
        <span class="text-emerald-400 font-semibold" id="welcomeMsg"></span>
        <button onclick="logout()"
          class="px-5 py-2 rounded-xl bg-rose-500/20 border border-rose-500/40 hover:bg-rose-500/30 text-rose-400 font-semibold transition">
          Logout
        </button>
      </div>
    </div>

    <!-- ───── MAIN CARD ───── -->
    <div class="max-w-7xl w-full bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-slate-700/50">
      <div class="text-center mb-10">
        <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-4 tracking-tight">
          ChaiCode Cinema - Now Showing<br /><br />
          <span class="text-red-400"><span class="font-bold">Dhurandhar The Revenge</span></span>
        </h1>
        <p class="text-slate-400 text-lg">Jassi ko ghar ki yaad kyu nhi aai?</p>
      </div>

      <div class="flex justify-center mb-10">
        <div class="bg-slate-900/50 rounded-full px-6 py-3 border border-slate-700 flex gap-8 items-center">
          <div class="flex items-center gap-3">
            <div class="w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.6)]"></div>
            <span class="text-slate-300 font-medium tracking-wide">Available</span>
          </div>
          <div class="w-px h-6 bg-slate-700"></div>
          <div class="flex items-center gap-3">
            <div class="w-4 h-4 rounded-full bg-rose-500/20 border border-rose-500/50"></div>
            <span class="text-slate-400 font-medium tracking-wide">Booked</span>
          </div>
        </div>
      </div>

      <div class="flex justify-center">
        <div class="bg-slate-900/40 p-8 rounded-2xl border border-slate-700/50 shadow-inner">
          <table id="tbl" class="border-separate border-spacing-4 mx-auto"></table>
        </div>
      </div>
    </div>

    <!-- ───── LOGIN / REGISTER MODAL ───── -->
    <div class="modal-overlay" id="authModal">
      <div class="bg-slate-800 border border-slate-700 rounded-3xl p-8 w-full max-w-md shadow-2xl relative">

        <!-- Close button -->
        <button onclick="closeModal()" class="absolute top-4 right-5 text-slate-400 hover:text-white text-2xl font-bold">✕</button>

        <!-- Tabs -->
        <div class="flex gap-2 mb-8 bg-slate-900/50 p-1 rounded-xl">
          <button id="loginTab" onclick="switchTab('login')"
            class="flex-1 py-2 rounded-lg font-semibold text-white bg-emerald-500 transition">
            Login
          </button>
          <button id="registerTab" onclick="switchTab('register')"
            class="flex-1 py-2 rounded-lg font-semibold text-slate-400 hover:text-white transition">
            Register
          </button>
        </div>

        <!-- Error message -->
        <div id="authError" class="hidden mb-4 px-4 py-3 bg-rose-500/20 border border-rose-500/40 text-rose-400 rounded-xl text-sm"></div>
        <!-- Success message -->
        <div id="authSuccess" class="hidden mb-4 px-4 py-3 bg-emerald-500/20 border border-emerald-500/40 text-emerald-400 rounded-xl text-sm"></div>

        <!-- Form -->
        <div class="flex flex-col gap-4">
          <div>
            <label class="block text-slate-400 text-sm mb-1">Username</label>
            <input id="authUsername" type="text" placeholder="Enter username"
              class="w-full px-4 py-3 rounded-xl bg-slate-900/60 border border-slate-600 text-white focus:outline-none focus:border-emerald-500 transition" />
          </div>
          <div>
            <label class="block text-slate-400 text-sm mb-1">Password</label>
            <input id="authPassword" type="password" placeholder="Enter password"
              class="w-full px-4 py-3 rounded-xl bg-slate-900/60 border border-slate-600 text-white focus:outline-none focus:border-emerald-500 transition" />
          </div>
          <button id="authSubmitBtn" onclick="handleAuth()"
            class="mt-2 w-full py-3 rounded-xl bg-emerald-500 hover:bg-emerald-400 text-white font-bold text-lg transition">
            Login
          </button>
        </div>
      </div>
    </div>

    <script>
      // ─── State ───────────────────────────────────────────────
      let currentTab = "login"; // 'login' or 'register'

      // Get token from localStorage
      function getToken() {
        return localStorage.getItem("token");
      }

      // ─── On page load: check if already logged in ────────────
      window.addEventListener("load", () => {
        const token = getToken();
        const username = localStorage.getItem("username");
        if (token && username) {
          showLoggedIn(username);
        }
        run(); // load seats
      });

      // ─── Show logged-in UI ───────────────────────────────────
      function showLoggedIn(username) {
        document.getElementById("authButtons").classList.add("hidden");
        document.getElementById("userInfo").classList.remove("hidden");
        document.getElementById("welcomeMsg").textContent = `👋 Welcome, ${username}!`;
      }

      // ─── Logout ──────────────────────────────────────────────
      function logout() {
        localStorage.removeItem("token");
        localStorage.removeItem("username");
        document.getElementById("authButtons").classList.remove("hidden");
        document.getElementById("userInfo").classList.add("hidden");
      }

      // ─── Modal open/close ────────────────────────────────────
      function openModal(tab) {
        document.getElementById("authModal").classList.add("active");
        switchTab(tab);
        clearMessages();
      }

      function closeModal() {
        document.getElementById("authModal").classList.remove("active");
        document.getElementById("authUsername").value = "";
        document.getElementById("authPassword").value = "";
        clearMessages();
      }

      function clearMessages() {
        document.getElementById("authError").classList.add("hidden");
        document.getElementById("authSuccess").classList.add("hidden");
      }

      // ─── Switch between Login / Register tabs ────────────────
      function switchTab(tab) {
        currentTab = tab;
        clearMessages();
        const loginTab = document.getElementById("loginTab");
        const registerTab = document.getElementById("registerTab");
        const btn = document.getElementById("authSubmitBtn");

        if (tab === "login") {
          loginTab.classList.add("bg-emerald-500", "text-white");
          loginTab.classList.remove("text-slate-400");
          registerTab.classList.remove("bg-emerald-500", "text-white");
          registerTab.classList.add("text-slate-400");
          btn.textContent = "Login";
        } else {
          registerTab.classList.add("bg-emerald-500", "text-white");
          registerTab.classList.remove("text-slate-400");
          loginTab.classList.remove("bg-emerald-500", "text-white");
          loginTab.classList.add("text-slate-400");
          btn.textContent = "Register";
        }
      }

      // ─── Handle Login / Register ─────────────────────────────
      async function handleAuth() {
        const username = document.getElementById("authUsername").value.trim();
        const password = document.getElementById("authPassword").value.trim();

        if (!username || !password) {
          showError("Username aur password dono bharo!");
          return;
        }

        const url = currentTab === "login"
          ? "/auth/login"
          : "/auth/register";

        try {
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
          });

          const data = await res.json();

          if (!res.ok) {
            showError(data.error || "Kuch gadbad ho gayi.");
            return;
          }

          if (currentTab === "register") {
            showSuccess("Registered successfully! Ab login karo.");
            switchTab("login");
            return;
          }

          // Login successful — save token
          localStorage.setItem("token", data.token);
          localStorage.setItem("username", username);
          showLoggedIn(username);
          closeModal();

        } catch (err) {
          showError("Server se connect nahi ho pa raha.");
        }
      }

      function showError(msg) {
        const el = document.getElementById("authError");
        el.textContent = msg;
        el.classList.remove("hidden");
        document.getElementById("authSuccess").classList.add("hidden");
      }

      function showSuccess(msg) {
        const el = document.getElementById("authSuccess");
        el.textContent = msg;
        el.classList.remove("hidden");
        document.getElementById("authError").classList.add("hidden");
      }

      // ─── Load Seats ──────────────────────────────────────────
      async function run() {
        const tbl = document.getElementById("tbl");
        const res = await fetch("/seats");
        const resarray = await res.json();
        const j = resarray.sort((a, b) => a.id - b.id);
        let tr;
        for (let i = 0; i < j.length; i++) {
          if (i % 8 === 0) tr = document.createElement("tr");

          const td = document.createElement("td");
          const baseClasses = "w-32 h-32 rounded-2xl text-center align-middle text-2xl font-bold transition-all duration-300 select-none relative group";

          if (j[i].isbooked) {
            td.className = `${baseClasses} bg-rose-500/10 text-rose-500/60 border border-rose-500/20 cursor-not-allowed`;
            td.innerHTML = `
              <span class="relative z-10">${j[i].id}</span>
              <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 px-4 py-2 bg-slate-900 border border-slate-700 text-sm text-slate-300 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none font-normal">
                Booked by: <span class="font-bold text-white ml-1">${j[i].name}</span>
                <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[1px] border-[6px] border-transparent border-t-slate-700"></div>
              </div>`;
          } else {
            td.className = `${baseClasses} bg-emerald-500 text-white border-2 border-emerald-400 shadow-[0_0_20px_rgba(16,185,129,0.3)] cursor-pointer hover:bg-emerald-400 hover:-translate-y-1.5 hover:shadow-[0_10px_25px_rgba(16,185,129,0.5)] active:scale-95`;
            td.innerHTML = `<span class="relative z-10">${j[i].id}</span>`;
          }

          td.addEventListener("click", async function (e) {
            const currentTd = e.currentTarget;
            if (currentTd.classList.contains("cursor-not-allowed")) return;

            // ── Check login before booking ──
            const token = getToken();
            if (!token) {
              alert("Pehle login karo! Tabhi seat book hogi. 😊");
              openModal("login");
              return;
            }

            try {
              const id = j[i].id;
              const name = prompt("Enter your name");
              if (!name) return;

              // ── Send token in Authorization header ──
              const res = await fetch(`/${id}/${name}`, {
                method: "PUT",
                headers: {
                  "Authorization": `Bearer ${token}`
                }
              });

              const data = await res.json();

              if (res.status === 401 || res.status === 403) {
                alert("Session expire ho gaya. Please dobara login karo.");
                logout();
                openModal("login");
                return;
              }

              if (data.error) {
                alert("FAILED! Seat already booked hai.");
              } else {
                alert("Seat successfully booked! 🎉");
                currentTd.className = `${baseClasses} bg-rose-500/10 text-rose-500/60 border border-rose-500/20 cursor-not-allowed`;
                currentTd.innerHTML = `
                  <span class="relative z-10">${id}</span>
                  <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 px-4 py-2 bg-slate-900 border border-slate-700 text-sm text-slate-300 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none font-normal">
                    Booked by: <span class="font-bold text-white ml-1">${name}</span>
                    <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[1px] border-[6px] border-transparent border-t-slate-700"></div>
                  </div>`;
              }
            } catch (ex) {
              alert("Error: " + ex);
            }
          });

          tr.appendChild(td);
          tbl.appendChild(tr);
        }
      }

      // Close modal if clicked outside
      document.getElementById("authModal").addEventListener("click", function(e) {
        if (e.target === this) closeModal();
      });
    </script>
  </body>
</html>
